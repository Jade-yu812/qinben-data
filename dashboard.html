<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>亲本靓丽 · 产品体验综合报告</title>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--r:#B8453A;--g:#5A9E7E;--a:#C49A4C;--bg:#FDF9F3;--card:#FFFCF8;--dk:#3D2B1F;--mu:#A6988A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dk)}
.header{background:linear-gradient(135deg,#3D2B1F,#5A3D2E,#3D2B1F);color:#E8D5B7;text-align:center;padding:30px 20px}
.header h1{font-size:24px}.header h1 span{color:var(--a)}
.header .sub{font-size:12px;opacity:.6;margin-top:4px}
.container{max-width:1300px;margin:0 auto;padding:20px}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.kpi{flex:1;min-width:100px;background:var(--card);border-radius:14px;padding:18px 12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.kpi .val{font-size:28px;font-weight:700}.kpi .lbl{font-size:11px;color:var(--mu);margin-top:4px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.04);margin-bottom:20px}
.card h3{font-size:15px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #E8DDD2}
.chart-wrap{position:relative;height:300px}.chart-wrap.sh{height:240px}
canvas{width:100%!important}
.insight{background:var(--bg);border-left:4px solid var(--a);border-radius:0 12px 12px 0;padding:14px 18px;margin:8px 0;font-size:14px;line-height:1.9}
.insight.r{border-left-color:var(--r)}.insight.g{border-left-color:var(--g)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);padding:10px 8px;border-bottom:2px solid #E8DDD2;font-weight:600;text-align:center}
td{padding:8px;border-bottom:1px solid #F0EBE3;text-align:center}
.tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500}
.tag.g{background:#E6F0E8;color:var(--g)}.tag.r{background:#FBE8E4;color:var(--r)}
.footer{text-align:center;padding:24px;color:var(--mu);font-size:12px}
@media(max-width:800px){.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header"><h1>亲本<span>靓丽</span> · 产品体验综合报告</h1><div class="sub">产品A「活体验报告」+ 产品B「润体验报告」· 10位体验者全维度数据</div></div>
<div class="container">

<div class="card"><h3>📊 核心数据总览</h3><div class="kpi-row" id="kpiRow"></div></div>

<div class="split">
  <div class="card"><h3>🔴 产品A · 整体接受度</h3><div class="chart-wrap"><canvas id="c_a1"></canvas></div></div>
  <div class="card"><h3>🟢 产品B · 整体接受度</h3><div class="chart-wrap"><canvas id="c_b1"></canvas></div></div>
</div>

<div class="split">
  <div class="card"><h3>🔴 产品A · 体感反应分布</h3><div class="chart-wrap"><canvas id="c_a2"></canvas></div></div>
  <div class="card"><h3>🟢 产品B · 咽喉&呼吸 按人</h3><div class="chart-wrap"><canvas id="c_b2"></canvas></div></div>
</div>

<div class="split">
  <div class="card"><h3>🔴 产品A · 体感强度 vs 舒适度</h3><div class="chart-wrap"><canvas id="c_a3"></canvas></div></div>
  <div class="card"><h3>🟢 产品B · 满意度分布</h3><div class="chart-wrap"><canvas id="c_b3"></canvas></div></div>
</div>

<div class="card"><h3>⚖️ 产品对比</h3><div id="compareTable"></div></div>
<div class="card"><h3>💡 综合发现</h3><div id="insights"></div></div>
<div class="card"><h3>📋 完成数据明细</h3><div style="overflow-x:auto" id="dataTable"></div></div>

</div>
<div class="footer">亲本靓丽品牌运营中心 · 综合报告 · 数据截止2026年7月</div>

<script>
var N=["王佳钰","晴蘭","崋扬","邓婷","王家棋","唐贝贝","刘秀玲","李斐","陶维柏","郭雯浩"];
var AD=[{age:30,gender:'女',ac:'可以接受',fv:'是',rd:'否',it:'否',pa:'否',nu:'是',sw:'否',hb:'否',bi:1,cm:'非常舒适',px:'完全可接受',sg:'无',ta:'带有回甘'},{age:52,gender:'女',ac:'可以接受',fv:'是',rd:'是',it:'是',pa:'否',nu:'否',sw:'否',hb:'否',bi:4,cm:'一般',px:'勉强可接受',sg:'无',ta:'回甘'},{age:null,gender:'',ac:'',fv:'',rd:'',it:'',pa:'',nu:'',sw:'',hb:'',bi:null,cm:'',px:'',sg:'',ta:''},{age:26,gender:'女',ac:'',fv:'',rd:'',it:'',pa:'',nu:'',sw:'',hb:'',bi:null,cm:'',px:'',sg:'',ta:''},{age:24,gender:'女',ac:'',fv:'',rd:'',it:'',pa:'',nu:'',sw:'',hb:'',bi:null,cm:'',px:'',sg:'',ta:''},{age:25,gender:'女',ac:'可以接受',fv:'',rd:'是',it:'否',pa:'否',nu:'是',sw:'否',hb:'否',bi:4,cm:'非常舒适',px:'完全可接受',sg:'无',ta:'有回甘'},{age:30,gender:'女',ac:'不太喜欢',fv:'是',rd:'是',it:'是',pa:'否',nu:'是',sw:'否',hb:'否',bi:2,cm:'有些不舒服',px:'完全可接受',sg:'肠胃不好不建议空腹喝',ta:'回甘甜腻'},{age:33,gender:'男',ac:'可以接受',fv:'否',rd:'否',it:'是',pa:'否',nu:'是',sw:'否',hb:'否',bi:1,cm:'舒适',px:'完全可接受',sg:'感觉还得增强一些',ta:'回甘，但是也有点涩'},{age:28,gender:'男',ac:'很喜欢',fv:'是',rd:'否',it:'是',pa:'否',nu:'否',sw:'否',hb:'否',bi:5,cm:'舒适',px:'完全可接受',sg:'产品良好，可以接受',ta:'回甘清甜'},{age:null,gender:'',ac:'',fv:'',rd:'',it:'',pa:'',nu:'',sw:'',hb:'',bi:null,cm:'',px:'',sg:'',ta:''}];
var BD=[{age:30,gender:'女',ac:'可以接受',tr:4,br:4,cf:'是',cfI:'轻微',sl:'否',ph:'无变化',dr:5,a30:'已恢复',st:4,ru:'是',bs:'无',ws:'无',sg:'无'},{age:52,gender:'女',ac:'可以接受',tr:4,br:4,cf:'是',cfI:'轻微',sl:'否',ph:'无变化',dr:5,a30:'仍滋润',st:4,ru:'是',bs:'无',ws:'无',sg:'无'},{age:null,gender:'',ac:'',tr:null,br:null,cf:'',cfI:'',sl:'',ph:'',dr:null,a30:'',st:null,ru:'',bs:'',ws:'',sg:''},{age:26,gender:'女',ac:'不太喜欢',tr:3,br:null,cf:'是',cfI:'中度',sl:'否',ph:'无变化',dr:15,a30:'已恢复',st:4,ru:'不确定',bs:'',ws:'',sg:'个人不喜欢这个口感'},{age:24,gender:'女',ac:'',tr:null,br:null,cf:'',cfI:'',sl:'',ph:'',dr:null,a30:'',st:null,ru:'',bs:'',ws:'',sg:''},{age:25,gender:'女',ac:'可以接受',tr:3,br:2,cf:'是',cfI:'轻微',sl:'否',ph:'无变化',dr:10,a30:'已恢复',st:4,ru:'是',bs:'润喉效果显著',ws:'无',sg:'无'},{age:30,gender:'女',ac:'可以接受',tr:4,br:4,cf:'是',cfI:'中度',sl:'否',ph:'无变化',dr:10,a30:'已恢复',st:3,ru:'是',bs:'比较清爽不黏腻',ws:'喝完回甘发苦烟草味儿太重',sg:'口感较之前有所改善，但是依旧难喝接受度一般'},{age:33,gender:'男',ac:'可以接受',tr:2,br:2,cf:'否',cfI:'',sl:'否',ph:'无变化',dr:0,a30:'已恢复',st:2,ru:'不确定',bs:'',ws:'',sg:'没有感觉，一点感觉都没有'},{age:28,gender:'男',ac:'可以接受',tr:4,br:3,cf:'是',cfI:'轻微',sl:'否',ph:'无变化',dr:10,a30:'略干',st:4,ru:'是',bs:'无',ws:'有点苦',sg:'建议可以改的有点清凉的感觉'},{age:null,gender:'',ac:'',tr:null,br:null,cf:'',cfI:'',sl:'',ph:'',dr:null,a30:'',st:null,ru:'',bs:'',ws:'',sg:''}];


var cA=AD.filter(function(d){return d.ac&&d.sg;}).length;
var cB=BD.filter(function(d){return d.ac&&d.sg;}).length;
var both=N.filter(function(_,i){return AD[i].ac&&AD[i].sg&&BD[i].ac&&BD[i].sg;}).length;

function rc(){
var C={r:'#B8453A',ro:'#D4795E',g:'#5A9E7E',t:'#4A8A9E',a:'#E8A838'};
Chart.defaults.font.family='"PingFang SC","Microsoft YaHei",sans-serif';

var avgBI=(AD.filter(function(d){return d.bi!==null;}).reduce(function(a,b){return a+b.bi;},0)/cA).toFixed(1);
var avgTR=(BD.filter(function(d){return d.tr!==null;}).reduce(function(a,b){return a+b.tr;},0)/cB).toFixed(1);
var avgST=(BD.filter(function(d){return d.st!==null;}).reduce(function(a,b){return a+b.st;},0)/cB).toFixed(1);
var reuseY=BD.filter(function(d){return d.ru==='是';}).length;

document.getElementById('kpiRow').innerHTML='<div class="kpi"><div class="val" style="color:'+C.r+'">'+cA+'/10</div><div class="lbl">产品A 完成</div></div><div class="kpi"><div class="val" style="color:'+C.g+'">'+cB+'/10</div><div class="lbl">产品B 完成</div></div><div class="kpi"><div class="val" style="color:'+C.a+'">'+both+'人</div><div class="lbl">双产品均完成</div></div><div class="kpi"><div class="val" style="color:'+C.r+'">'+avgBI+'</div><div class="lbl">A体感强度均值</div></div><div class="kpi"><div class="val" style="color:'+C.g+'">'+avgTR+'</div><div class="lbl">B咽喉缓解均值</div></div><div class="kpi"><div class="val" style="color:'+C.a+'">'+avgST+'</div><div class="lbl">B满意度均值</div></div><div class="kpi"><div class="val" style="color:'+C.t+'">'+reuseY+'/'+cB+'</div><div class="lbl">愿再次使用B</div></div>';

var m={};AD.forEach(function(d){if(d.ac&&d.sg)m[d.ac]=(m[d.ac]||0)+1;});
new Chart(document.getElementById('c_a1'),{type:'doughnut',data:{labels:Object.keys(m),datasets:[{data:Object.values(m),backgroundColor:[C.g,C.a,C.ro,C.r],borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{padding:14,usePointStyle:true}}}}});

m={};BD.forEach(function(d){if(d.ac&&d.sg)m[d.ac]=(m[d.ac]||0)+1;});
new Chart(document.getElementById('c_b1'),{type:'doughnut',data:{labels:Object.keys(m),datasets:[{data:Object.values(m),backgroundColor:[C.g,C.a,C.ro,C.r],borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{padding:14,usePointStyle:true}}}}});

var rx=['发热','发红','发痒','发麻','出汗','心跳'],fs=['fv','rd','it','nu','sw','hb'];
var yes=fs.map(function(f){return AD.filter(function(d){return d[f]==='是'&&d.sg;}).length;});
new Chart(document.getElementById('c_a2'),{type:'bar',data:{labels:rx,datasets:[{data:yes,backgroundColor:[C.r,C.ro,C.a,C.r,C.ro,C.a],borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{max:8,ticks:{stepSize:1}}},plugins:{legend:{display:false}}}});

var filled=N.filter(function(_,i){return BD[i].ac&&BD[i].sg;});
new Chart(document.getElementById('c_b2'),{type:'bar',data:{labels:filled,datasets:[{label:'咽喉缓解',data:filled.map(function(_,i){return BD[i].tr||0;}),backgroundColor:C.g,borderRadius:6},{label:'呼吸顺畅',data:filled.map(function(_,i){return BD[i].br||0;}),backgroundColor:C.t,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{max:5,ticks:{stepSize:1}}},plugins:{legend:{position:'bottom',labels:{usePointStyle:true}}}}});

var cmMap={'非常舒适':5,'舒适':4,'一般':3,'有些不舒服':2,'很不舒服':1};
var fa=AD.filter(function(d){return d.bi!==null&&d.sg;});
new Chart(document.getElementById('c_a3'),{type:'bar',data:{labels:fa.map(function(_,i){return N[i];}),datasets:[{label:'体感强度',data:fa.map(function(d){return d.bi;}),backgroundColor:C.r,borderRadius:6},{label:'舒适度',data:fa.map(function(d){return cmMap[d.cm]||0;}),backgroundColor:'rgba(90,158,126,0.4)',borderColor:C.g,borderWidth:2,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{max:6,ticks:{stepSize:1}}},plugins:{legend:{position:'bottom',labels:{usePointStyle:true}}}}});

var sm={};BD.forEach(function(d){if(d.st!==null&&d.sg)sm[d.st]=(sm[d.st]||0)+1;});
new Chart(document.getElementById('c_b3'),{type:'doughnut',data:{labels:Object.keys(sm).map(function(k){return k+'分';}),datasets:[{data:Object.values(sm),backgroundColor:[C.ro,C.a,C.g,C.t,C.r],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{padding:12,usePointStyle:true}}}}});

var acA=AD.filter(function(d){return (d.ac==='很喜欢'||d.ac==='可以接受')&&d.sg;}).length;
var acB=BD.filter(function(d){return (d.ac==='很喜欢'||d.ac==='可以接受')&&d.sg;}).length;
var nuA=AD.filter(function(d){return d.nu==='是'&&d.sg;}).length;
var cfB=BD.filter(function(d){return d.cf==='是'&&d.sg;}).length;
var drVals=BD.filter(function(d){return d.dr!==null&&d.sg;});
var drB=drVals.length?Math.round(drVals.reduce(function(a,b){return a+b.dr;},0)/drVals.length):0;
document.getElementById('compareTable').innerHTML='<table><tr><th>维度</th><th style="color:'+C.r+'">产品A·活体验</th><th style="color:'+C.g+'">产品B·润体验</th></tr><tr><td>完成率</td><td>'+cA+'/10</td><td>'+cB+'/10</td></tr><tr><td>正面接受度</td><td>'+acA+'人</td><td>'+acB+'人</td></tr><tr><td>核心指标均值</td><td>体感强度 '+avgBI+'分</td><td>咽喉缓解 '+avgTR+'分</td></tr><tr><td>最常见反应</td><td>发麻('+nuA+'/'+cA+'='+Math.round(nuA/cA*100)+'%)</td><td>清凉感('+cfB+'/'+cB+'='+Math.round(cfB/cB*100)+'%)</td></tr><tr><td>舒适持续</td><td>—</td><td>均值 '+drB+'分钟</td></tr><tr><td>最大槽点</td><td>空腹不适/体感过强</td><td>中药味/烟草味偏重</td></tr><tr><td>定位建议</td><td>强体感验证型</td><td>日常润喉养护型</td></tr></table>';

document.getElementById('insights').innerHTML='<div class="insight r"><b>🔴 产品A</b> · '+cA+'人完成。体感强度均值'+avgBI+'分，发麻最常见('+nuA+'人)。<b>晴蘭(52岁)</b>体感最强(4分)，需关注年长人群耐受度。<b>刘秀玲</b>空腹出现头晕恶心反酸，须标注"建议饭后饮用"。</div><div class="insight g"><b>🟢 产品B</b> · '+cB+'人完成，咽喉缓解'+avgTR+'分，'+reuseY+'人愿再次使用。主要槽点为中药/烟草味，建议优化口感增加清凉感。<b>李斐(33岁男)</b>满意度仅2分，"一点感觉都没有"。</div><div class="insight"><b>💡 综合建议</b> · 两款互补：A做体感验证，B做日常养护。<b>'+both+'人</b>已完成双产品体验。崋扬、王家棋、郭雯浩尚未完成。建议推出"体验套装"捆绑销售。</div>';

document.getElementById('dataTable').innerHTML='<table><tr><th>姓名</th><th>年龄</th><th>性别</th><th>A接受度</th><th>A强度</th><th>A舒适度</th><th>B接受度</th><th>B咽喉</th><th>B满意度</th><th>B复用</th></tr>'+N.map(function(n,i){return'<tr><td><strong>'+n+'</strong></td><td>'+(AD[i].age||'-')+'</td><td>'+(AD[i].gender||'-')+'</td><td>'+(AD[i].ac&&AD[i].sg?'<span class="tag '+(AD[i].ac==='很喜欢'||AD[i].ac==='可以接受'?'g':'r')+'">'+AD[i].ac+'</span>':'-')+'</td><td>'+(AD[i].bi!==null?AD[i].bi:'-')+'</td><td>'+(AD[i].cm||'-')+'</td><td>'+(BD[i].ac&&BD[i].sg?'<span class="tag '+(BD[i].ac==='很喜欢'||BD[i].ac==='可以接受'?'g':'r')+'">'+BD[i].ac+'</span>':'-')+'</td><td>'+(BD[i].tr!==null?BD[i].tr:'-')+'</td><td>'+(BD[i].st!==null?BD[i].st:'-')+'</td><td>'+(BD[i].ru||'-')+'</td></tr>';}).join('')+'</table>';
}

(function wait(){if(typeof Chart!=="undefined")rc();else setTimeout(wait,200);})();
</script>
</body>
</html>
