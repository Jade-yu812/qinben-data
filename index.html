body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dk);font-size:14px}

.c{max-width:960px;margin:0 auto;padding:16px}
.sec{margin-bottom:24px}
.stitle{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:17px;font-weight:700}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500}
.be{background:#E6F0E8;color:var(--g)} .ba{background:#FDF0ED;color:var(--r)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:#fff;border-radius:16px;padding:22px;border:2px solid #E8DDD2;position:relative;cursor:pointer;transition:all .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.icon{font-size:44px;text-align:center;margin-bottom:10px}
.name{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.desc{font-size:12px;color:var(--mu);text-align:center;margin-bottom:12px}
.bar{height:6px;background:#E8DDD2;border-radius:3px;overflow:hidden;margin:10px 0}
.barin{height:100%;border-radius:3px}
.meta{display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--mu);margin-bottom:12px}
.tag{position:absolute;top:14px;right:14px;font-size:10px;padding:3px 10px;border-radius:10px}
.tge{background:#E6F0E8;color:var(--g)} .tga{background:#FDF0ED;color:var(--r)}
.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:20px;border:1.5px solid #E8DDD2;background:#fff;color:var(--dk);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none}
.btn.fm{background:var(--a);color:#fff;border-color:var(--a)}
.btn.rp{background:#E6F0E8;color:var(--g);border-color:var(--g)}
.fot{text-align:center;padding:24px;color:var(--mu);font-size:11px;line-height:2}
a{color:var(--a);text-decoration:none}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
