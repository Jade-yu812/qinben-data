<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>亲本靓丽 · 品牌体验平台</title>
<style>
:root{--r:#B8453A;--g:#5A9E7E;--a:#C49A4C;--bg:#FDF9F3;--card:#FFFCF8;--dk:#3D2B1F;--mu:#A6988A;--brd:#E8DDD2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dk);min-height:100vh;font-size:14px;line-height:1.6}
.header{background:linear-gradient(135deg,#3D2B1F,#5A3D2E,#3D2B1F);color:#E8D5B7;padding:18px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.header h1{font-size:20px;font-weight:700}
.header h1 span{color:var(--a)}
.header .sub{font-size:11px;opacity:.6;margin-top:2px}
.container{max-width:960px;margin:0 auto;padding:16px}
.cat-section{margin-bottom:24px}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:17px;font-weight:700}
.cat-header .badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500}
.cat-header .badge.end{background:#E6F0E8;color:var(--g)}
.cat-header .badge.active{background:#FDF0ED;color:var(--r)}
.cat-header .badge.wait{background:#F0EBE3;color:var(--mu)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.product-card{background:var(--card);border-radius:16px;padding:22px;transition:all .2s;border:2px solid var(--brd);position:relative;overflow:hidden}
.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.pc-icon{font-size:44px;margin-bottom:10px;text-align:center}
.pc-name{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.pc-desc{font-size:12px;color:var(--mu);text-align:center;margin-bottom:12px;line-height:1.5}
.pc-bar{height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin:10px 0}
.pc-bar-inner{height:100%;border-radius:3px;transition:width .5s}
.pc-meta{display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--mu);margin-bottom:12px}
.pc-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pc-tag{position:absolute;top:14px;right:14px;font-size:10px;padding:3px 10px;border-radius:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:20px;border:1.5px solid var(--brd);background:#fff;color:var(--dk);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;text-decoration:none}
.btn:hover{background:var(--bg)}
.btn.pri{background:var(--a);color:#fff;border-color:var(--a);font-weight:600}
.btn.rpt{background:#E6F0E8;color:var(--g);border-color:var(--g)}

/* Form view */
.fsec{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--brd)}
.fsec .fttl{font-size:14px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid var(--brd)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg.full{grid-column:1/-1}
.flbl{font-size:13px;font-weight:600}
.finp,.fsel,.ftxt{padding:9px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;width:100%}
.finp:focus,.fsel:focus,.ftxt:focus{outline:none;border-color:var(--a)}
.ftxt{resize:vertical;min-height:60px}
.rrow{display:flex;gap:8px;flex-wrap:wrap}
.rpill{padding:7px 14px;border-radius:18px;border:1.5px solid var(--brd);background:#fff;font-size:12px;cursor:pointer;user-select:none;font-weight:500;color:var(--mu);transition:all .15s}
.rpill.sel{background:#FBE8E4;border-color:var(--r);color:var(--r);font-weight:600}
.sr{display:flex;gap:4px;font-size:28px;cursor:pointer}
.sr .star{color:var(--brd);transition:color .15s}
.sr .star.on{color:var(--a)}
.cw{margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--r);display:none;gap:6px;flex-wrap:wrap}
.cw.show{display:flex}
.cw .fg{flex:1;min-width:80px}
.cw label{font-size:11px;color:var(--mu)}
.ban{color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:14px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.12)}
.ban h2{font-size:18px}
.tchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center}
.tchip{padding:7px 14px;border-radius:18px;border:1.5px solid var(--brd);background:#fff;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.tchip.sel{background:var(--a);color:#fff;border-color:var(--a);font-weight:600}
.tchip.done{border-color:var(--g);color:var(--g)}
.tchip.done::after{content:' ✓';font-size:10px}
.tbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.moverlay{position:fixed;inset:0;background:rgba(61,43,31,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:#fff;border-radius:18px;padding:24px;max-width:720px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:85vh;overflow-y:auto}

/* Report */
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rpt-card{background:var(--bg);border-radius:12px;padding:14px;}
.rpt-card.full{grid-column:1/-1}
.rpt-card h4{font-size:14px;margin-bottom:8px}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.kpi-box{flex:1;min-width:80px;background:var(--bg);border-radius:12px;padding:14px 10px;text-align:center}
.kpi-box .val{font-size:26px;font-weight:700}
.kpi-box .lbl{font-size:10px;color:var(--mu);margin-top:3px}
.stats-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.stats-table th{background:var(--bg);padding:8px 6px;text-align:center;font-weight:600;border-bottom:2px solid var(--brd)}
.stats-table td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--brd)}
.insight-box{background:var(--bg);border-left:3px solid var(--a);border-radius:0 10px 10px 0;padding:12px 14px;margin:8px 0;font-size:13px;line-height:1.8}
.bar-h{display:flex;align-items:center;gap:8px;margin:4px 0}
.bar-h .bar-lbl{width:60px;font-size:11px;text-align:right;color:var(--mu)}
.bar-h .bar-track{flex:1;height:20px;background:var(--brd);border-radius:10px;overflow:hidden}
.bar-h .bar-fill{height:100%;border-radius:10px;transition:width .4s;display:flex;align-items:center;padding-left:8px;font-size:10px;color:#fff;font-weight:600;min-width:30px}
.leg{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:4px;vertical-align:middle}
@media(max-width:600px){
  .product-grid{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
  .rpt-grid{grid-template-columns:1fr}
  .header h1{font-size:18px}
  .header{padding:14px 16px}
  .container{padding:10px}
  .product-card{padding:16px}
  .pc-icon{font-size:36px}
  .pc-name{font-size:16px}
  .btn{padding:7px 12px;font-size:12px}
  .tbar{gap:4px}
  .tchip{padding:6px 10px;font-size:11px}
  .ban{padding:12px 14px}.ban h2{font-size:16px}
  .cat-header{font-size:15px}
  .fsec{padding:12px}
  .finp,.fsel,.ftxt{padding:10px 12px;font-size:16px}
  .rpill{padding:8px 14px;font-size:13px}
  .flbl{font-size:14px}
  .sr{font-size:32px}
}
</style>
</head>

var __EXP = {};

var _fetch = window.fetch;
window.fetch = function(url, opts) {
  url = typeof url === 'string' ? url : url.url;
  if (url === '/api/platform') return Promise.resolve({ ok: true, json: function() { return Promise.resolve(__PLATFORM); } });
  var m = url.match(/\/api\/schema\/(.+)/);
  if (m) { var n = decodeURIComponent(m[1]); return Promise.resolve({ ok: !!__SCHEMAS[n], json: function() { return Promise.resolve(__SCHEMAS[n] || {}); } }); }
  m = url.match(/\/api\/data\/(.+)/);
  if (m && (!opts || opts.method !== 'POST')) {
    var dn = m[1];
    if (dn.startsWith('_exp_')) { var pn = dn.replace('_exp_', ''); return Promise.resolve({ ok: true, json: function() { return Promise.resolve(__EXP[pn] ? { _experiment: __EXP[pn] } : {}); } }); }

    var tester = body.tester, fields = body.fields;
    if (!__DATA[dn2]) __DATA[dn2] = {};
    if (!__DATA[dn2][tester]) __DATA[dn2][tester] = {};
    Object.assign(__DATA[dn2][tester], fields);
    localStorage.setItem('qinben_data', JSON.stringify(__DATA));
    return Promise.resolve({ ok: true, json: function() { return Promise.resolve({ ok: true }); } });
  }
  m = url.match(/\/api\/delete\/(.+)/);
  if (m && opts && opts.method === 'POST') { var dn3 = m[1]; var b2 = JSON.parse(opts.body); if (__DATA[dn3] && __DATA[dn3][b2.tester]) { delete __DATA[dn3][b2.tester]; localStorage.setItem('qinben_data', JSON.stringify(__DATA)); } return Promise.resolve({ ok: true, json: function() { return Promise.resolve({ ok: true }); } }); }
  m = url.match(/\/api\/progress\/(.+)/);
  if (m) {
    var dn4 = decodeURIComponent(m[1]); var d = __DATA[dn4] || {}; var ts = __SCHEMAS[dn4] ? __SCHEMAS[dn4].testerPool : [];
    var cf = __SCHEMAS[dn4] ? __SCHEMAS[dn4].completionField : ''; var fl = ts.filter(function(t) { return d[t] && d[t][cf]; }).length;
    var obj = { total: ts.length, filled: fl, testers: {} }; ts.forEach(function(t) { obj.testers[t] = !!(d[t] && d[t][cf]); });
    return Promise.resolve({ ok: true, json: function() { return Promise.resolve(obj); } });
  }

};

<script>
let PF, view='home', CP, CT='', CF={};

async function init(){
  try{ const r=await fetch('/api/platform'); PF=await r.json(); } catch(e){ PF={config:{},products:[]}; }
  for(const p of PF.products||[]){
    try{ const r=await fetch('/api/progress/'+encodeURIComponent(p.name)); p._pg=await r.json(); } catch(e){ p._pg={total:0,filled:0}; }
  }
  render();
}

function render(){
  const a=document.getElementById('app');
  if(view==='home') a.innerHTML=home();
  else if(view==='form') a.innerHTML=fm();
  else if(view==='report') a.innerHTML=rpt();
  if(view==='form') setTimeout(bind,100);
  if(view==='report') setTimeout(genRpt,100);
}

// ──── HOME ────
function home(){
  const ps=PF.products||[], cm=ps.filter(p=>p.status==='completed'), ac=ps.filter(p=>p.status==='active'), pd=ps.filter(p=>p.status==='pending'||!p.status);
  let h='';
  function cards(arr,title,icon,cls){
    const realCount=arr.filter(p=>!p._isReport).length;
    if(arr.length===0) return `<div class="cat-section"><div class="cat-header">${icon} ${title} <span class="badge ${cls}">0个</span></div><div style="text-align:center;padding:20px;color:var(--mu);font-size:13px">暂无</div></div>`;
    h=`<div class="cat-section"><div class="cat-header">${icon} ${title} <span class="badge ${cls}">${realCount}个</span></div><div class="product-grid">`;
    arr.forEach(p=>{
      if(p._isReport){ h+=p._reportCard; return; }
      const pg=p._pg||{}, pct=pg.total>0?Math.round(pg.filled/pg.total*100):0;
      const tl={completed:'已结束',active:'进行中',pending:'待开始'},tlc={completed:'end',active:'active',pending:'wait'};
      h+=`<div class="product-card" style="border-color:${p.color}30"><span class="pc-tag ${tlc[p.status]||'wait'}" style="background:${tlc[p.status]==='end'?'#E6F0E8':tlc[p.status]==='active'?'#FDF0ED':'#F0EBE3'};color:${tlc[p.status]==='end'?'var(--g)':tlc[p.status]==='active'?'var(--r)':'var(--mu)'}">${tl[p.status]||'待开始'}</span>
      <div class="pc-icon">${p.icon||'📋'}</div><div class="pc-name" style="color:${p.color}">${p.name}</div>
      <div class="pc-desc">${p.description||''}</div>
      <div class="pc-meta"><span>👥 ${pg.total||p.testerCount||0}位体验者</span><span>📝 ${pg.filled||0}人完成</span></div>
      <div class="pc-bar"><div class="pc-bar-inner" style="width:${pct}%;background:${p.color}"></div></div>
      <div class="pc-actions"><button class="btn pri" style="background:${p.color};border-color:${p.color}" onclick="openProd('${p.name}')">📝 填表</button>${p.status==='completed'?`<button class="btn rpt" onclick="window.location.href='/report.html?product=${encodeURIComponent(p.name)}&color=${encodeURIComponent(p.color)}&icon=${encodeURIComponent(p.icon||'📋')}'">📊 查看报告</button>`:''}</div></div>`;
    });
    h+=`</div></div>`; return h;
  }
  // 综合体验报告卡片 — 插入到已结束产品后面
  if(cm.length>0){
    const totalFilled=cm.reduce((s,p)=>s+(p._pg?.filled||0),0);
    const reportCard='<div class="product-card" style="border-color:#C49A4C30;background:linear-gradient(135deg,#FFFCF8,#FDF9F3);cursor:pointer" onclick="window.open(\'/dashboard.html\',\'_blank\')">'+
      '<div class="pc-icon">📈</div><div class="pc-name" style="color:#C49A4C">综合体验报告</div>'+
      '<div class="pc-desc">全部已结束产品的数据对比分析</div>'+
      '<div class="pc-meta"><span>👥 '+((PF.config&&PF.config.testerPool)||cm[0]?.testerPool||[]).length+'位体验者</span><span>📝 '+totalFilled+'份报告</span></div>'+
      '<div class="pc-actions"><button class="btn rpt" onclick="event.stopPropagation();window.open(\'/dashboard.html\',\'_blank\')">📊 查看综合报告</button></div></div>';
    cm.push({_isReport:true, _reportCard:reportCard});
  }

  // 综合实验报告卡片 — 插入到正在体验产品后面
  if(ac.length>0){
    const expCard='<div class="product-card" style="border-color:#C49A4C30;background:linear-gradient(135deg,#FFFCF8,#FDF9F3);cursor:pointer" onclick="window.open(\'/dashboard.html\',\'_blank\')">'+
      '<div class="pc-icon">🔬</div><div class="pc-name" style="color:#C49A4C">综合实验报告</div>'+
      '<div class="pc-desc">护肝口服液 + SOD冻干片 · 实验数据汇总</div>'+
      '<div class="pc-meta"><span>🛡️ 分解酒精度数</span><span>💊 抗氧化测试</span></div>'+
      '<div class="pc-actions"><button class="btn rpt" onclick="event.stopPropagation();window.location.href=\'/exp-report.html\'">🔬 查看实验报告</button></div></div>';
    ac.push({_isReport:true, _reportCard:expCard});
  }

  return cards(cm,'结束体验','✅','end')+cards(ac,'正在体验','🔄','active')+cards(pd,'等待体验','⏳','wait')+'<div style="text-align:center;color:var(--mu);font-size:11px;padding:20px">亲本靓丽品牌运营中心 · 体验平台 v2.0<br>新增产品：在 products 文件夹添加 schema.json</div>';
}

// ──── FORM ────
async function openProd(n){ CP=n; view='form'; CT=''; CF={};
  try{const r=await fetch('/api/schema/'+encodeURIComponent(n));CP=await r.json();}catch(e){showT('加载失败');return;}
  try{const r=await fetch('/api/data/'+encodeURIComponent(n));CP._d=await r.json();}catch(e){CP._d={};}
  try{const r=await fetch('/api/data/_exp_'+encodeURIComponent(n));CP._exp=await r.json();}catch(e){CP._exp={};}
  CT=(CP.testerPool||[])[0]||''; render(); window.scrollTo(0,0); }

function fm(){
  const p=CP; if(!p)return'';
  const formSec=(p.sections||[]).filter(s=>!s.title.includes('报告'));
  const expSec=(p.sections||[]).filter(s=>s.title.includes('报告'));

  const bn=`<div class="ban" style="background:linear-gradient(135deg,${p.color},${p.color}dd)"><h2>${p.icon||''} ${p.name}</h2><div style="font-size:11px;opacity:.85;margin-top:3px">${p.description||''} · 体验者：${CT}</div></div>`;

  // Part 1: Tester chips + individual form
  let cs='<div class="tchips">';(p.testerPool||[]).forEach(n=>{const dn=!!(p._d[n]&&p._d[n][p.completionField]);cs+=`<div class="tchip${n===CT?' sel':''}${dn?' done':''}" onclick="swT('${n}')">${n}</div>`;});cs+='</div>';
  const tb=`<div class="tbar"><button class="btn" onclick="goHome()">← 返回</button><button class="btn" onclick="expCSV()">📥 CSV</button><button class="btn" onclick="rstMe()">🔄 清空重填</button></div>`;
  let ss='';formSec.forEach(s=>{ss+=`<div class="fsec"><div class="fttl">${s.icon||''} ${s.title}</div><div class="fgrid">`;s.fields.forEach(f=>{ss+=rf(f);});ss+=`</div></div>`;});
  const nb=`<div style="text-align:center;margin:16px 0"><button class="btn pri" style="background:${p.color};border-color:${p.color};padding:12px 28px;font-size:15px;border-radius:24px;font-weight:700" onclick="doSubmit()">✓ 确认提交</button><div style="font-size:10px;color:var(--mu);margin-top:4px">填写完最后一项后点击确认</div></div>`;
  return bn+cs+tb+ss+nb+'<div id="mslot"></div>';
}

function rfExp(f,v){
  const at=`data-field="${f.id}" data-exp="1"`;
  switch(f.type){
    case 'text':return`<div class="fg full"><label class="flbl">${f.label}</label><input class="finp" value="${esc(v)}" placeholder="${f.placeholder||''}" ${at}></div>`;
    case 'textarea':return`<div class="fg full"><label class="flbl">${f.label}</label><textarea class="ftxt" placeholder="${f.placeholder||''}" ${at}>${esc(v)}</textarea></div>`;
    case 'select':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}" data-exp="1">${(f.options||[]).map(o=>`<span class="rpill${v===o?' sel':''}" data-val="${o}">${o}</span>`).join('')}</div></div>`;
    case 'yesno':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}" data-exp="1"><span class="rpill${v==='是'?' sel':''}" data-val="是">是</span><span class="rpill${v==='否'?' sel':''}" data-val="否">否</span></div></div>`;
    case 'number':return`<div class="fg"><label class="flbl">${f.label}</label><input class="finp" type="number" value="${v}" ${at}>${f.suffix?' <span style="font-size:11px;color:var(--mu)">'+f.suffix+'</span>':''}</div>`;
    case 'date':return`<div class="fg"><label class="flbl">${f.label}</label><input class="finp" type="date" value="${v}" ${at}></div>`;
    default:return`<div class="fg"><label class="flbl">${f.label}</label><input class="finp" value="${esc(v)}" ${at}></div>`;
  }
}

function saveExp(){
  CP._exp = CP._exp || {};
  document.querySelectorAll('[data-exp=\"1\"]').forEach(el=>{
    if(el.classList.contains('rpill')&&el.classList.contains('sel')){ CP._exp[el.parentElement.dataset.field]=el.dataset.val; return; }
    if(el.dataset.field&&!el.classList.contains('rpill')) CP._exp[el.dataset.field]=el.value;
  });
  fetch('/api/data/_exp_'+encodeURIComponent(CP.name),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tester:'_experiment',fields:CP._exp})}).catch(()=>{});
  showT('✅ 实验数据已保存');
}

function rf(f){
  const d=CP._d[CT]||{}, v=d[f.id]||'', at=`data-field="${f.id}"`;
  if(!f||!f.type) return '';
  switch(f.type){
    case 'tester-select':return`<div class="fg full"><label class="flbl">${f.label}</label><input class="finp" value="${CT}" readonly style="background:var(--bg);font-weight:600"></div>`;
    case 'number':return`<div class="fg"><label class="flbl">${f.label}${f.hint?' <span style="font-size:10px;color:var(--mu)">('+f.hint+')</span>':''}</label><input class="finp" type="number" min="${f.min||0}" max="${f.max||999}" value="${v}" ${at}>${f.suffix?' <span style="font-size:11px;color:var(--mu)">'+f.suffix+'</span>':''}</div>`;
    case 'text':return`<div class="fg full"><label class="flbl">${f.label}</label><input class="finp" value="${esc(v)}" placeholder="${f.placeholder||''}" ${at}></div>`;
    case 'textarea':return`<div class="fg full"><label class="flbl">${f.label}</label><textarea class="ftxt" placeholder="${f.placeholder||''}" ${at}>${esc(v)}</textarea></div>`;
    case 'select':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}">${(f.options||[]).map(o=>`<span class="rpill${v===o?' sel':''}" data-val="${o}">${o}</span>`).join('')}</div></div>`;
    case 'yesno':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}"><span class="rpill${v==='是'?' sel':''}" data-val="是">是</span><span class="rpill${v==='否'?' sel':''}" data-val="否">否</span></div></div>`;
    case 'rating':return`<div class="fg"><label class="flbl">${f.label}</label><div class="sr" data-field="${f.id}" data-val="${v}">${'★'.repeat(f.max||5).split('').map((_,i)=>`<span class="star${i<v?' on':''}" data-star="${i+1}">★</span>`).join('')}</div><input type="hidden" value="${v}" data-field="${f.id}"></div>`;
    case 'conditional':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}"><span class="rpill${v==='是'?' sel':''}" data-val="是">是</span><span class="rpill${v==='否'?' sel':''}" data-val="否">否</span></div><div class="cw${v==='是'?' show':''}" data-cond="${f.id}">${(f.subFields||[]).map(sf=>rsf(sf,d)).join('')}</div></div>`;
    case 'inline':if(f.inlineTemplate&&f.subFields){const parts=f.inlineTemplate.split(/\{(\w+)\}/g);const tmpl=parts.map((p,i)=>i%2===1?rin(f.subFields.find(s=>s.id===p),d):`<span style="font-size:13px;color:var(--mu)">${p}</span>`).join('');return`<div class="fg full"><label class="flbl">${f.label}</label><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${tmpl}</div></div>`;}return'';
    case 'date':return`<div class="fg"><label class="flbl">${f.label}</label><input class="finp" type="date" value="${v}" ${at}></div>`;
    default:return`<div class="fg"><label class="flbl">${f.label}</label><input class="finp" value="${esc(v)}" ${at}></div>`;
  }
}
function rsf(sf,d){const v=d[sf.id]||'';if(sf.type==='select')return`<div style="flex:1;min-width:80px"><label style="font-size:10px;color:var(--mu)">${sf.label}</label><select class="fsel" data-field="${sf.id}" style="padding:5px 8px;font-size:12px"><option value="">--</option>${(sf.options||[]).map(o=>`<option value="${o}"${v===o?' selected':''}>${o}</option>`).join('')}</select></div>`;return`<div style="flex:1;min-width:80px"><label style="font-size:10px;color:var(--mu)">${sf.label}</label><input class="finp" data-field="${sf.id}" value="${esc(v)}" style="padding:5px 8px;font-size:12px"></div>`;}
function rin(sf,d){return sf?`<input class="finp" data-field="${sf.id}" value="${esc(d[sf.id]||'')}" type="number" min="0" style="width:${sf.width||60}px;text-align:center;padding:5px 4px;font-size:13px">`:'';}

// Form events
function bind(){
  document.querySelectorAll('.rrow:not([data-exp])').forEach(r=>{r.onclick=function(e){const p=e.target.closest('.rpill');if(!p)return;const f=r.dataset.field;if(r.querySelector('.rpill.sel')===p){p.classList.remove('sel');sv(f,'');}else{r.querySelectorAll('.rpill').forEach(x=>x.classList.remove('sel'));p.classList.add('sel');sv(f,p.dataset.val);}const c=document.querySelector('.cw[data-cond="'+f+'"]');if(c)c.classList.toggle('show',p.dataset.val==='是');};});
  document.querySelectorAll('.sr').forEach(r=>{r.onclick=function(e){const s=e.target.closest('.star');if(!s)return;const v=parseInt(s.dataset.star);r.dataset.val=v;r.querySelectorAll('.star').forEach((x,i)=>{x.classList.toggle('on',i<v);});sv(r.dataset.field,v);};});
  document.querySelectorAll('.finp:not([data-exp]),.ftxt:not([data-exp]),.fsel:not([data-exp])').forEach(e=>{e.addEventListener('change',()=>{if(e.dataset.field)sv(e.dataset.field,e.value);});e.addEventListener('blur',()=>{if(e.dataset.field)sv(e.dataset.field,e.value);});});
  // Experiment fields: just toggle visual, don't save to tester
  document.querySelectorAll('.rrow[data-exp]').forEach(r=>{r.onclick=function(e){const p=e.target.closest('.rpill');if(!p)return;r.querySelectorAll('.rpill').forEach(x=>x.classList.remove('sel'));p.classList.add('sel');};});
}
function showConfirm(){
  const p=CP;
  document.getElementById('mslot').innerHTML='<div class="moverlay" onclick="if(event.target===this)this.parentNode.innerHTML=\'\'"><div class="mbox"><h3 style="text-align:center;margin-bottom:12px">✅ 填写完成</h3><div style="text-align:center;padding:12px;font-size:15px;line-height:2">你已完成<strong>'+(p.completionLabel||p.name)+'</strong>的填写<br>请确认后保存</div><div style="display:flex;gap:8px;justify-content:center"><button class="btn pri" onclick="CF[\''+p.name+'\']=true;document.getElementById(\'mslot\').innerHTML=\'\';showT(\'✅ 已确认保存\')">✓ 确认保存</button><button class="btn" onclick="this.closest(\'.moverlay\').remove()">继续修改</button></div></div></div>';
}
async function sv(fid,val){
  if(!CT||!CP)return;if(!CP._d[CT])CP._d[CT]={};CP._d[CT][fid]=val;
  try{await fetch('/api/data/'+encodeURIComponent(CP.name),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tester:CT,fields:{[fid]:val}})});}catch(e){}
  if(fid===CP.completionField&&val)setTimeout(showConfirm,400);
}
function swT(n){CT=n;render();window.scrollTo(0,200);}
function goHome(){view='home';CP=null;render();}
function doSubmit(){if(CP&&CP.completionField)sv(CP.completionField,'已确认');}
async function expCSV(){window.open('/api/export/'+encodeURIComponent(CP?.name||''),'_blank');}
async function rstMe(){if(!confirm('清空 '+CT+' 的数据？'))return;try{await fetch('/api/delete/'+encodeURIComponent(CP?.name),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tester:CT})});}catch(e){}if(CP._d[CT])delete CP._d[CT];render();showT('🔄 已清空');}

// ──── REPORT ────
async function viewRpt(n){CP=n;view='report';
  try{const r=await fetch('/api/schema/'+encodeURIComponent(n));CP=await r.json();}catch(e){showT('加载失败');return;}
  try{const r=await fetch('/api/data/'+encodeURIComponent(n));CP._d=await r.json();}catch(e){CP._d={};}
  render();window.scrollTo(0,0);}

function rpt(){
  const p=CP;if(!p)return'';const ts=p.testerPool||[],dt=p._d||{},cf=p.completionField,fl=ts.filter(t=>dt[t]&&dt[t][cf]).length;
  const allF=(p.sections||[]).flatMap(s=>s.fields), selF=allF.filter(f=>f.type==='select'&&f.options&&f.options.includes('很喜欢')), ratF=allF.filter(f=>f.type==='rating');

  let h=`<div class="tbar"><button class="btn" onclick="goHome()">← 返回</button><button class="btn" onclick="openProd('${p.name}')">📝 填表</button><button class="btn pri" onclick="expCSV()">📥 CSV</button></div>`;
  h+=`<div class="ban" style="background:linear-gradient(135deg,${p.color},${p.color}dd)"><h2>${p.icon||''} ${p.name} · 体验报告</h2><div style="font-size:11px;opacity:.85;margin-top:3px">${fl}/${ts.length} 人完成</div></div>`;

  // KPI
  h+=`<div class="kpi-row"><div class="kpi-box"><div class="val" style="color:${p.color}">${fl}/${ts.length}</div><div class="lbl">完成人数</div></div>`;
  ratF.forEach(f=>{const vs=ts.map(t=>dt[t]?Number(dt[t][f.id]):null).filter(v=>v!==null&&!isNaN(v));if(vs.length)h+=`<div class="kpi-box"><div class="val" style="color:${p.color}">${(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1)}</div><div class="lbl">${f.label}均值</div></div>`;});
  h+=`</div>`;

  // Acceptance distribution
  if(selF.length>0){
    const f=selF[0]; const dist={}; ts.forEach(t=>{const v=dt[t]?dt[t][f.id]:null;if(v)dist[v]=(dist[v]||0)+1;});
    const cols={};let ci=0;Object.keys(dist).forEach(k=>{cols[k]=['#5A9E7E','#E8A838','#D4795E','#B8453A'][ci%4];ci++;});
    const maxV=Math.max(...Object.values(dist),1);
    h+=`<div class="rpt-card"><h4>📊 ${f.label}分布（${Object.values(dist).reduce((a,b)=>a+b,0)}人）</h4>`;
    Object.entries(dist).forEach(([k,v])=>{h+=`<div class="bar-h"><div class="bar-lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxV*100)}%;background:${cols[k]}">${v}人</div></div></div>`;});
    h+=`</div>`;
  }

  // Rating bars
  if(ratF.length>0){
    h+=`<div class="rpt-card full"><h4>📊 ${ratF.map(f=>f.label).join(' / ')}  按体验者</h4><div style="overflow-x:auto"><table class="stats-table"><tr><th>姓名</th>${ratF.map(f=>'<th>'+f.label+'</th>').join('')}</tr>`;
    ts.filter(t=>dt[t]&&dt[t][cf]).forEach(t=>{h+=`<tr><td><strong>${t}</strong></td>${ratF.map(f=>'<td>'+(dt[t][f.id]||'-')+'</td>').join('')}</tr>`;});
    h+=`</table></div></div>`;
  }

  // Data table
  const kf=allF.filter(f=>['select','rating','yesno','text','textarea'].includes(f.type)).slice(0,8);
  h+=`<div class="rpt-card full"><h4>📋 数据明细</h4><div style="overflow-x:auto"><table class="stats-table"><tr><th>姓名</th>${kf.map(f=>'<th>'+f.label+'</th>').join('')}</tr>`;
  ts.forEach(t=>{const td=dt[t]||{};h+=`<tr><td><strong>${t}</strong></td>${kf.map(f=>'<td>'+(td[f.id]||'-')+'</td>').join('')}</tr>`;});
  h+=`</table></div></div>`;

  return h;
}

// ──── UTILS ────
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}
function genRpt(){}
init();
</script>
