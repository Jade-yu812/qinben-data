<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>亲本靓丽 · 品牌体验平台</title>
<style>
:root{--r:#B8453A;--g:#5A9E7E;--a:#C49A4C;--bg:#FDF9F3;--card:#FFFCF8;--dk:#3D2B1F;--mu:#A6988A;--brd:#E8DDD2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dk);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#3D2B1F,#5A3D2E,#3D2B1F);color:#E8D5B7;padding:18px 20px;text-align:center}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--a)}.header .sub{font-size:11px;opacity:.6}
.container{max-width:960px;margin:0 auto;padding:16px}
.cat-section{margin-bottom:24px}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:17px;font-weight:700}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500}
.badge.end{background:#E6F0E8;color:var(--g)}.badge.active{background:#FDF0ED;color:var(--r)}.badge.wait{background:#F0EBE3;color:var(--mu)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.product-card{background:var(--card);border-radius:16px;padding:22px;transition:all .2s;border:2px solid var(--brd);position:relative;overflow:hidden}
.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.pc-icon{font-size:44px;margin-bottom:10px;text-align:center}
.pc-name{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.pc-desc{font-size:12px;color:var(--mu);text-align:center;margin-bottom:12px}
.pc-bar{height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin:10px 0}
.pc-bar-inner{height:100%;border-radius:3px;transition:width .5s}
.pc-meta{display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--mu);margin-bottom:12px}
.pc-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pc-tag{position:absolute;top:14px;right:14px;font-size:10px;padding:3px 10px;border-radius:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:20px;border:1.5px solid var(--brd);background:#fff;color:var(--dk);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg)}.btn.pri{background:var(--a);color:#fff;border-color:var(--a);font-weight:600}
.btn.rpt{background:#E6F0E8;color:var(--g);border-color:var(--g)}
.fsec{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--brd)}
.fsec .fttl{font-size:14px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid var(--brd)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.fg{display:flex;flex-direction:column;gap:3px}.fg.full{grid-column:1/-1}
.flbl{font-size:13px;font-weight:600}
.finp,.fsel,.ftxt{padding:9px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;width:100%}
.finp:focus,.fsel:focus,.ftxt:focus{outline:none;border-color:var(--a)}
.ftxt{resize:vertical;min-height:60px}
.rrow{display:flex;gap:8px;flex-wrap:wrap}
.rpill{padding:7px 14px;border-radius:18px;border:1.5px solid var(--brd);background:#fff;font-size:12px;cursor:pointer;user-select:none;font-weight:500;color:var(--mu);transition:all .15s}
.rpill.sel{background:#FBE8E4;border-color:var(--r);color:var(--r);font-weight:600}
.sr{display:flex;gap:4px;font-size:28px;cursor:pointer}
.sr .star{color:var(--brd);transition:color .15s}.sr .star.on{color:var(--a)}
.cw{margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--r);display:none;gap:6px;flex-wrap:wrap}
.cw.show{display:flex}.cw .fg{flex:1;min-width:80px}.cw label{font-size:11px;color:var(--mu)}
.ban{color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:14px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.12)}
.ban h2{font-size:18px}
.tchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center}
.tchip{padding:7px 14px;border-radius:18px;border:1.5px solid var(--brd);background:#fff;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.tchip.sel{background:var(--a);color:#fff;border-color:var(--a);font-weight:600}
.tchip.done{border-color:var(--g);color:var(--g)}.tchip.done::after{content:' ✓';font-size:10px}
.tbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.moverlay{position:fixed;inset:0;background:rgba(61,43,31,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:#fff;border-radius:18px;padding:24px;max-width:720px;width:100%;max-height:85vh;overflow-y:auto}
.ks{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.kb{flex:1;min-width:80px;background:var(--bg);border-radius:12px;padding:14px 10px;text-align:center}
.kb .val{font-size:26px;font-weight:700}.kb .lbl{font-size:10px;color:var(--mu)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg);padding:8px 6px;border-bottom:2px solid var(--brd);font-weight:600;text-align:center}
td{padding:7px 6px;border-bottom:1px solid var(--brd);text-align:center}
.bar-h{display:flex;align-items:center;gap:8px;margin:4px 0}
.bar-h .bl{width:60px;font-size:11px;text-align:right;color:var(--mu)}
.bar-h .bt{flex:1;height:20px;background:var(--brd);border-radius:10px;overflow:hidden}
.bar-h .bf{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:8px;font-size:10px;color:#fff;font-weight:600}
.ins{background:var(--bg);border-left:3px solid var(--a);border-radius:0 10px 10px 0;padding:12px 14px;margin:8px 0;font-size:13px;line-height:1.8}
@media(max-width:600px){.product-grid{grid-template-columns:1fr}.fgrid{grid-template-columns:1fr}}
</style>
</head>

function rf(f,d){ const v=d[f.id]||''; if(!f||!f.type)return'';
  switch(f.type){
    case 'tester-select':return`<div class="fg full"><label class="flbl">${f.label}</label><input class="finp" value="${CT}" readonly style="background:var(--bg);font-weight:600"></div>`;
    case 'number':return`<div class="fg"><label class="flbl">${f.label}${f.hint?' <span style="font-size:10px;color:var(--mu)">('+f.hint+')</span>':''}</label><input class="finp" type="number" min="${f.min||0}" max="${f.max||999}" value="${v}" data-field="${f.id}">${f.suffix?' <span style="font-size:11px;color:var(--mu)">'+f.suffix+'</span>':''}</div>`;
    case 'text':return`<div class="fg full"><label class="flbl">${f.label}</label><input class="finp" value="${esc(v)}" data-field="${f.id}"></div>`;
    case 'textarea':return`<div class="fg full"><label class="flbl">${f.label}</label><textarea class="ftxt" data-field="${f.id}">${esc(v)}</textarea></div>`;
    case 'select':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}">${(f.options||[]).map(o=>`<span class="rpill${v===o?' sel':''}" data-val="${o}">${o}</span>`).join('')}</div></div>`;
    case 'yesno':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}"><span class="rpill${v==='是'?' sel':''}" data-val="是">是</span><span class="rpill${v==='否'?' sel':''}" data-val="否">否</span></div></div>`;
    case 'rating':return`<div class="fg"><label class="flbl">${f.label}</label><div class="sr" data-field="${f.id}" data-val="${v}">${'★'.repeat(f.max||5).split('').map((_,i)=>`<span class="star${i<v?' on':''}" data-star="${i+1}">★</span>`).join('')}</div></div>`;
    case 'conditional':return`<div class="fg"><label class="flbl">${f.label}</label><div class="rrow" data-field="${f.id}"><span class="rpill${v==='是'?' sel':''}" data-val="是">是</span><span class="rpill${v==='否'?' sel':''}" data-val="否">否</span></div><div class="cw${v==='是'?' show':''}" data-cond="${f.id}">${(f.subFields||[]).map(sf=>{const sv=d[sf.id]||'';if(sf.type==='select')return`<div style="flex:1;min-width:80px"><label style="font-size:10px;color:var(--mu)">${sf.label}</label><select class="fsel" data-field="${sf.id}" style="padding:5px 8px;font-size:12px"><option value="">--</option>${(sf.options||[]).map(o=>`<option value="${o}"${sv===o?' selected':''}>${o}</option>`).join('')}</select></div>`;return`<div style="flex:1;min-width:80px"><label style="font-size:10px;color:var(--mu)">${sf.label}</label><input class="finp" data-field="${sf.id}" value="${esc(sv)}" style="padding:5px 8px;font-size:12px"></div>`;}).join('')}</div></div>`;
    case 'date':return`<div class="fg"><label class="flbl">${f.label}</label><input class="finp" type="date" value="${v}" data-field="${f.id}"></div>`;
    default:return`<div class="fg"><label class="flbl">${f.label}</label><input class="finp" value="${esc(v)}" data-field="${f.id}"></div>`;
  }
}

function bind(){
  document.querySelectorAll('.rrow').forEach(r=>{r.onclick=function(e){const p=e.target.closest('.rpill');if(!p)return;const f=r.dataset.field;if(r.querySelector('.rpill.sel')===p){p.classList.remove('sel');sv(f,'');}else{r.querySelectorAll('.rpill').forEach(x=>x.classList.remove('sel'));p.classList.add('sel');sv(f,p.dataset.val);}const c=document.querySelector('.cw[data-cond="'+f+'"]');if(c)c.classList.toggle('show',p.dataset.val==='是');};});
  document.querySelectorAll('.sr').forEach(r=>{r.onclick=function(e){const s=e.target.closest('.star');if(!s)return;const v=parseInt(s.dataset.star);r.dataset.val=v;r.querySelectorAll('.star').forEach((x,i)=>{x.classList.toggle('on',i<v);});sv(r.dataset.field,v);};});
  document.querySelectorAll('.finp,.ftxt,.fsel').forEach(e=>{e.addEventListener('change',()=>{if(e.dataset.field)sv(e.dataset.field,e.value);});e.addEventListener('blur',()=>{if(e.dataset.field)sv(e.dataset.field,e.value);});});
}

function rpt(){
  const p=CP; if(!p)return''; const d=getPD(p), ts=p.testerPool||[], cf=p.completionField, fl=ts.filter(t=>d[t]&&d[t][cf]).length;
  const allF=(p.sections||[]).flatMap(s=>s.fields), ratF=allF.filter(f=>f.type==='rating'), selF=allF.filter(f=>f.type==='select'&&f.options&&f.options.includes('很喜欢'));
  let h=`<div class="tbar"><button class="btn" onclick="goHome()">← 返回</button><button class="btn" onclick="openP('${p.name}')">📝 填表</button><button class="btn pri" onclick="expCSV()">📥 CSV</button></div>`;
  h+=`<div class="ban" style="background:linear-gradient(135deg,${p.color},${p.color}dd)"><h2>${p.icon} ${p.name} · 体验报告</h2><div style="font-size:11px;opacity:.85">${fl}/${ts.length} 人完成</div></div>`;
  h+=`<div class="ks"><div class="kb"><div class="val" style="color:${p.color}">${fl}/${ts.length}</div><div class="lbl">完成</div></div>`;
  ratF.forEach(f=>{const vs=ts.map(t=>d[t]?Number(d[t][f.id]):null).filter(v=>v!==null&&!isNaN(v));if(vs.length)h+=`<div class="kb"><div class="val" style="color:${p.color}">${(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1)}</div><div class="lbl">${f.label}均值</div></div>`;});
  h+=`</div>`;
  if(selF.length){const f=selF[0],dist={};ts.forEach(t=>{const v=d[t]?d[t][f.id]:null;if(v)dist[v]=(dist[v]||0)+1;});const cols=['#5A9E7E','#E8A838','#D4795E','#B8453A'];let ci=0;const maxV=Math.max(...Object.values(dist),1);h+=`<div class="fsec"><div class="fttl">📊 ${f.label}分布</div>`;Object.entries(dist).forEach(([k,v])=>{h+=`<div class="bar-h"><div class="bl">${k}</div><div class="bt"><div class="bf" style="width:${Math.round(v/maxV*100)}%;background:${cols[ci%4]}">${v}人</div></div></div>`;ci++;});h+=`</div>`;}
  h+=`<div class="fsec"><div class="fttl">📋 明细</div><table><tr><th>姓名</th>${ratF.map(f=>'<th>'+f.label+'</th>').join('')}${selF.map(f=>'<th>'+f.label+'</th>').join('')}</tr>`;
  ts.forEach(t=>{const td=d[t]||{};h+=`<tr><td><strong>${t}</strong></td>${ratF.map(f=>'<td>'+(td[f.id]||'-')+'</td>').join('')}${selF.map(f=>'<td>'+(td[f.id]||'-')+'</td>').join('')}</tr>`;});
  return h+`</table></div>`;
}

function exportAll(){
  let all='';
  PRODUCTS.forEach(p=>{const d=getPD(p),ts=p.testerPool||[],allF=(p.sections||[]).flatMap(s=>s.fields).flatMap(f=>f.type==='conditional'?[f.id,...(f.subFields||[]).map(s=>s.id)]:[f.id]);all+='=== '+p.name+' ===\n';all+='﻿'+allF.map(f=>'"'+f+'"').join(',')+'\n';ts.forEach(t=>{const td=d[t]||{};all+=allF.map(f=>'"'+String(td[f]||'').replace(/"/g,'""')+'"').join(',')+'\n';});all+='\n\n';});
  download('亲本靓丽_全部数据.csv',all,'text/csv');
  showT('📥 全部数据已下载');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(){try{const d=JSON.parse(r.result);saveData(d);showT('✅ 数据已导入，刷新查看');setTimeout(()=>{goHome();},500);}catch(e){showT('⚠️ 文件格式错误');}};r.readAsText(f);};
  inp.click();
}
function rstMe(){if(!confirm('清空 '+CT+' 的数据？'))return;const d=loadData();if(d[CP.name]&&d[CP.name][CT])delete d[CP.name][CT];saveData(d);render();showT('🔄 已清空');}

function download(fn,content,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href);}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}
render();
</script>
</body>
</html>
