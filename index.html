<style>
:root{--r:#B8453A;--g:#5A9E7E;--a:#C49A4C;--bg:#FDF9F3;--dk:#3D2B1F;--mu:#A6988A;--brd:#E8DDD2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dk);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#3D2B1F,#5A3D2E,#3D2B1F);color:#E8D5B7;padding:18px 20px;text-align:center}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--a)}.header .sub{font-size:11px;opacity:.6}
.container{max-width:960px;margin:0 auto;padding:16px}
.cat-section{margin-bottom:24px}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:17px;font-weight:700}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500}
.badge.end{background:#E6F0E8;color:var(--g)}.badge.active{background:#FDF0ED;color:var(--r)}.badge.wait{background:#F0EBE3;color:var(--mu)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.product-card{background:#fff;border-radius:16px;padding:22px;border:2px solid var(--brd);position:relative}
.pc-icon{font-size:44px;margin-bottom:10px;text-align:center}
.pc-name{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.pc-desc{font-size:12px;color:var(--mu);text-align:center;margin-bottom:12px}
.pc-bar{height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin:10px 0}
.pc-bar-inner{height:100%;border-radius:3px}
.pc-meta{display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--mu);margin-bottom:12px}
.pc-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pc-tag{position:absolute;top:14px;right:14px;font-size:10px;padding:3px 10px;border-radius:10px;background:#E6F0E8;color:var(--g)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:20px;border:1.5px solid var(--brd);background:#fff;color:var(--dk);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--bg)}.btn.pri{background:var(--a);color:#fff;border-color:var(--a);font-weight:600}
.btn.rpt{background:#E6F0E8;color:var(--g);border-color:var(--g)}
.footer{text-align:center;padding:24px;color:var(--mu);font-size:11px}
@media(max-width:600px){.product-grid{grid-template-columns:1fr}}
</style>
</head>
