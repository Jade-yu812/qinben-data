<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>亲本靓丽 · 品牌体验平台</title>
<style>
:root{--r:#B8453A;--g:#5A9E7E;--a:#C49A4C;--bg:#FDF9F3;--card:#FFFCF8;--dk:#3D2B1F;--mu:#A6988A;--brd:#E8DDD2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dk);min-height:100vh}
.header{background:linear-gradient(135deg,#3D2B1F,#5A3D2E,#3D2B1F);color:#E8D5B7;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.header h1{font-size:20px;font-weight:700;letter-spacing:.05em}
.header h1 span{color:var(--a)}
.header .sub{font-size:11px;opacity:.6;margin-top:2px}
.container{max-width:900px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(61,43,31,.06);border:1px solid var(--brd)}
.card h3{font-size:15px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--brd);display:flex;align-items:center;gap:6px}
/* Product list */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.product-card{background:var(--bg);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s;border:2px solid transparent;text-align:center}
.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.product-card .icon{font-size:36px;margin-bottom:8px}
.product-card .name{font-size:16px;font-weight:700;margin-bottom:4px}
.product-card .desc{font-size:11px;color:var(--mu);margin-bottom:8px}
.product-card .meta{font-size:11px;color:var(--mu)}
.product-card .bar-wrap{height:4px;background:var(--brd);border-radius:2px;margin-top:10px;overflow:hidden}
.product-card .bar-inner{height:100%;border-radius:2px;transition:width .4s}
/* Form */
.form-section{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(61,43,31,.04);border:1px solid var(--brd)}
.form-section .sec-title{font-size:14px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid var(--brd);display:flex;align-items:center;gap:6px}
.form-section .sec-hint{font-size:10px;color:var(--mu);margin-left:auto}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.form-grid.col-1{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:13px;font-weight:600;color:var(--dk)}
.form-label .req{color:var(--r)}
.form-label .hint{font-weight:400;font-size:11px;color:var(--mu)}
.form-input,.form-select,.form-textarea{padding:9px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--a);box-shadow:0 0 0 3px rgba(196,154,76,.1)}
.form-textarea{resize:vertical;min-height:60px}
.radio-row{display:flex;gap:8px;flex-wrap:wrap}
.radio-pill{padding:7px 14px;border-radius:18px;border:1.5px solid var(--brd);background:#fff;font-size:12px;cursor:pointer;user-select:none;font-weight:500;color:var(--mu);transition:all .15s}
.radio-pill.sel{background:#FBE8E4;border-color:var(--r);color:var(--r);font-weight:600}
.star-row{display:flex;gap:4px;font-size:28px;cursor:pointer}
.star-row .star{color:var(--brd);transition:color .15s}
.star-row .star.on{color:var(--a)}
.cond-wrap{margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--r);display:none;gap:6px;flex-wrap:wrap}
.cond-wrap.show{display:flex}
.cond-wrap .form-group{flex:1;min-width:80px}
.cond-wrap label{font-size:11px;color:var(--mu)}
/* Banner */
.prod-banner{color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:14px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.12)}
.prod-banner h2{font-size:18px}
.prod-banner .dsc{font-size:11px;opacity:.85;margin-top:3px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:20px;border:1.5px solid var(--brd);background:#fff;color:var(--dk);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;text-decoration:none}
.btn:hover{background:var(--bg)}
.btn.pri{background:var(--a);color:#fff;border-color:var(--a);font-weight:600}
.btn.big{padding:12px 28px;font-size:15px;border-radius:24px;font-weight:700;letter-spacing:.04em;box-shadow:0 4px 14px rgba(0,0,0,.1)}
.btn.back{background:transparent;border:none;color:var(--mu);font-size:14px}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(61,43,31,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:18px;padding:24px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:80vh;overflow-y:auto}
.modal-box h3{font-size:17px;margin-bottom:10px;text-align:center}
.tester-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center}
.tester-chip{padding:7px 14px;border-radius:18px;border:1.5px solid var(--brd);background:#fff;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.tester-chip.sel{background:var(--a);color:#fff;border-color:var(--a);font-weight:600}
.tester-chip.done{border-color:var(--g);color:var(--g)}
.tester-chip.done::after{content:' ✓';font-size:10px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.prod-banner h2{font-size:15px}}
</style>
</head>
<body>

<div class="header"><h1>亲本<span>靓丽</span> · 品牌体验平台</h1><div class="sub">多产品 · 可配置 · 体验数据收集与分析</div></div>

<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
let platform, currentView='home', currentProduct=null, currentTester='';
let CONFIRMED = {};

// ==================== INIT ====================
async function init(){
  try{
    const r=await fetch('/api/platform'); platform=await r.json();
  }catch(e){ platform={config:{brand:'亲本靓丽',testerPool:[]},products:[]}; }
  render();
}

// ==================== RENDER ====================
function render(){
  const app=document.getElementById('app');
  if(currentView==='home') app.innerHTML=renderHome();
  else if(currentView==='form') app.innerHTML=renderProductForm();
  if(currentView==='form'){ setTimeout(attachFormEvents,100); }
}

function renderHome(){
  const ps=platform.products||[];
  let h=`<h3 style="margin-bottom:14px;color:var(--dk)">📦 产品列表（${ps.length}）</h3>`;
  if(ps.length===0){ h+=`<div class="card" style="text-align:center;color:var(--mu);padding:40px">暂无产品，请将产品配置放入 products 文件夹</div>`; }
  else {
    h+=`<div class="product-grid">`;
    ps.forEach((p,i)=>{
      h+=`<div class="product-card" onclick="openProduct('${p.name}')" style="border-color:${p.color}20">
        <div class="icon">${p.icon||'📋'}</div>
        <div class="name" style="color:${p.color}">${p.name}</div>
        <div class="desc">${p.description||''}</div>
        <div class="meta">${p.testerCount} 位体验者</div>
        <div class="bar-wrap"><div class="bar-inner" style="width:${getProgressPct(p)}%;background:${p.color}"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="card" style="margin-top:16px;text-align:center"><div style="color:var(--mu);font-size:13px">品牌运营中心 · 体验平台 v2.0<br>新增产品：在 products 文件夹添加 schema.json 即可</div></div>`;
  return h;
}

function getProgressPct(p){
  // We load progress from the API
  return 0; // Will be updated async
}

// ==================== PRODUCT FORM ====================
async function openProduct(dirName){
  currentProduct=dirName;
  currentView='form';
  currentTester='';
  CONFIRMED={};
  // Load schema
  try{ const r=await fetch('/api/schema/'+encodeURIComponent(dirName)); currentProduct=await r.json(); }
  catch(e){ showToast('加载产品失败'); return; }
  // Load data
  try{ const r=await fetch('/api/data/'+encodeURIComponent(dirName)); currentProduct._data=await r.json(); }
  catch(e){ currentProduct._data={}; }
  if(!currentProduct.testerPool||currentProduct.testerPool.length===0){ showToast('产品未配置体验者'); return; }
  currentTester=currentProduct.testerPool[0];
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderProductForm(){
  const p=currentProduct;
  if(!p) return '';
  const banner=`<div class="prod-banner" style="background:linear-gradient(135deg,${p.color||'#B8453A'},${p.color||'#B8453A'}dd)"><h2>${p.icon||''} ${p.name}</h2><div class="dsc">${p.description||''} · 体验者：${currentTester}</div></div>`;

  // Tester chips
  let chips='<div class="tester-chips">';
  (p.testerPool||[]).forEach(n=>{
    const done=!!(p._data[n]&&p._data[n][p.completionField]);
    chips+=`<div class="tester-chip${n===currentTester?' sel':''}${done?' done':''}" onclick="switchTester('${n}')">${n}</div>`;
  });
  chips+='</div>';

  // Toolbar
  const toolbar=`<div class="toolbar">
    <button class="btn back" onclick="goHome()">← 返回</button>
    <button class="btn" onclick="exportCSV()">📥 导出CSV</button>
    <button class="btn" onclick="resetMyData()">🔄 清空重填</button>
    <span style="font-size:11px;color:var(--mu);margin-left:auto">${p.completionField?'完成标志：'+p.completionField:''}</span>
  </div>`;

  // Sections
  let sections='';
  (p.sections||[]).forEach(sec=>{
    sections+=`<div class="form-section">
      <div class="sec-title">${sec.icon||''} ${sec.title}<span class="sec-hint">${sec.hint||''}</span></div>
      <div class="form-grid${sec.fields.every(f=>f.type==='textarea'||f.type==='conditional')?' col-1':''}">`;
    sec.fields.forEach(f=>{ sections+=renderField(f); });
    sections+=`</div></div>`;
  });

  // Next button
  const isLast=isLastProduct();
  const nextLabel=isLast?('✓ 确认提交'+p.completionLabel||''):('下一步 →');
  const nextAction=isLast?`submitFinal()`:`openNextProduct()`;
  const nextBtn=`<div style="text-align:center;margin:16px 0">
    <button class="btn pri big" onclick="${nextAction}" style="background:${p.color};border-color:${p.color}">${nextLabel}</button>
    <div style="font-size:10px;color:var(--mu);margin-top:6px">填写完「${getCompletionFieldLabel(p)}」后点击确认</div>
  </div>`;

  return banner+chips+toolbar+sections+nextBtn+'<div id="modalSlot"></div>';
}

function renderField(f){
  const d=currentProduct._data[currentTester]||{};
  const v=d[f.id]||'';
  const attrs=`data-field="${f.id}"`;
  const wClass=f.width==='half'?' style="max-width:120px"':'';
  let h='';

  switch(f.type){
    case 'tester-select':
      h=`<div class="form-group full"><label class="form-label">${f.label}${f.required?'<span class="req">*</span>':''}</label>
        <input class="form-input" value="${currentTester}" readonly style="background:var(--bg);font-weight:600"></div>`;
      break;
    case 'number':
      h=`<div class="form-group"${wClass}><label class="form-label">${f.label}${f.required?'<span class="req">*</span>':''}${f.hint?'<span class="hint">（'+f.hint+'）</span>':''}</label>
        <input class="form-input" type="number" min="${f.min||0}" max="${f.max||999}"${f.step?' step="'+f.step+'"':''} value="${v}" ${attrs}>${f.suffix?('<span style="font-size:12px;color:var(--mu)">'+f.suffix+'</span>'):''}</div>`;
      break;
    case 'text':
      h=`<div class="form-group full"><label class="form-label">${f.label}</label>
        <input class="form-input" value="${esc(v)}" placeholder="${f.placeholder||''}" ${attrs}></div>`;
      break;
    case 'textarea':
      h=`<div class="form-group full"><label class="form-label">${f.label}</label>
        <textarea class="form-textarea" placeholder="${f.placeholder||''}" ${attrs}>${esc(v)}</textarea></div>`;
      break;
    case 'select':
      h=`<div class="form-group"><label class="form-label">${f.label}${f.required?'<span class="req">*</span>':''}</label>
        <div class="radio-row" data-field="${f.id}">${(f.options||[]).map(o=>`<span class="radio-pill${v===o?' sel':''}" data-val="${o}">${o}</span>`).join('')}</div></div>`;
      break;
    case 'yesno':
      h=`<div class="form-group"><label class="form-label">${f.label}</label>
        <div class="radio-row" data-field="${f.id}"><span class="radio-pill${v==='是'?' sel':''}" data-val="是">是</span><span class="radio-pill${v==='否'?' sel':''}" data-val="否">否</span></div></div>`;
      break;
    case 'rating':
      h=`<div class="form-group"><label class="form-label">${f.label}</label>
        <div class="star-row" data-field="${f.id}" data-val="${v}">${Array.from({length:f.max||5},(_,i)=>`<span class="star${i<v?' on':''}" data-star="${i+1}">★</span>`).join('')}</div>
        <input type="hidden" value="${v}" data-field="${f.id}"></div>`;
      break;
    case 'conditional':
      h=`<div class="form-group"><label class="form-label">${f.label}</label>
        <div class="radio-row" data-field="${f.id}"><span class="radio-pill${v==='是'?' sel':''}" data-val="是">是</span><span class="radio-pill${v==='否'?' sel':''}" data-val="否">否</span></div>
        <div class="cond-wrap${v==='是'?' show':''}" data-cond="${f.id}">${(f.subFields||[]).map(sf=>renderSubField(sf,v,d,f)).join('')}</div></div>`;
      break;
    case 'inline':
      if(f.inlineTemplate && f.subFields){
        const parts=f.inlineTemplate.split(/\{(\w+)\}/g);
        const tmpl=parts.map((part,i)=>{
          if(i%2===1){ const sf=f.subFields.find(s=>s.id===part); return sf?renderInlineInput(sf,d):''; }
          return `<span style="font-size:13px;color:var(--mu)">${part}</span>`;
        }).join('');
        h=`<div class="form-group full"><label class="form-label">${f.label}</label><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${tmpl}</div></div>`;
      }
      break;
    case 'date':
      h=`<div class="form-group"><label class="form-label">${f.label}${f.required?'<span class="req">*</span>':''}</label>
        <input class="form-input" type="date" value="${v}" ${attrs}></div>`;
      break;
    default:
      h=`<div class="form-group"><label class="form-label">${f.label}</label><input class="form-input" value="${esc(v)}" ${attrs}></div>`;
  }
  return h;
}

function renderSubField(sf,parentVal,d,parentField){
  const v=d[sf.id]||'';
  if(sf.type==='select'){
    return `<div style="flex:1;min-width:80px"><label style="font-size:11px;color:var(--mu)">${sf.label}</label><select class="form-input" data-field="${sf.id}" style="padding:6px 10px;font-size:12px"><option value="">--</option>${(sf.options||[]).map(o=>`<option value="${o}"${v===o?' selected':''}>${o}</option>`).join('')}</select></div>`;
  }
  return `<div style="flex:1;min-width:80px"><label style="font-size:11px;color:var(--mu)">${sf.label}</label><input class="form-input" data-field="${sf.id}" value="${esc(v)}" placeholder="${sf.placeholder||''}" style="padding:6px 10px;font-size:12px"></div>`;
}

function renderInlineInput(sf,d){
  const v=d[sf.id]||'';
  return `<input class="form-input" data-field="${sf.id}" value="${esc(v)}" type="number" min="0" style="width:${sf.width||60}px;text-align:center;padding:6px 4px;font-size:13px">`;
}

// ==================== FORM EVENTS ====================
function attachFormEvents(){
  // Radio pills
  document.querySelectorAll('.radio-row').forEach(row=>{
    row.onclick=function(e){
      const pill=e.target.closest('.radio-pill'); if(!pill) return;
      const field=row.dataset.field;
      if(row.querySelector('.radio-pill.sel')===pill){ pill.classList.remove('sel'); saveField(field,''); }
      else{ row.querySelectorAll('.radio-pill').forEach(p=>p.classList.remove('sel')); pill.classList.add('sel'); saveField(field,pill.dataset.val); }
      // Conditional
      const cond=document.querySelector(`.cond-wrap[data-cond="${field}"]`);
      if(cond) cond.classList.toggle('show',pill.dataset.val==='是');
    };
  });
  // Stars
  document.querySelectorAll('.star-row').forEach(row=>{
    row.onclick=function(e){
      const star=e.target.closest('.star'); if(!star) return;
      const val=parseInt(star.dataset.star);
      row.dataset.val=val;
      row.querySelectorAll('.star').forEach((s,i)=>{s.classList.toggle('on',i<val);});
      saveField(row.dataset.field,val);
    };
  });
  // Inputs
  document.querySelectorAll('.form-input,.form-textarea,.form-select').forEach(el=>{
    el.addEventListener('change',()=>saveField(el.dataset.field,el.value));
    el.addEventListener('blur',()=>{if(el.dataset.field)saveField(el.dataset.field,el.value);});
  });
  // Init conditionals
  document.querySelectorAll('.cond-wrap').forEach(cw=>{
    const field=cw.dataset.cond;
    const pill=document.querySelector(`.radio-row[data-field="${field}"] .radio-pill.sel`);
    if(pill) cw.classList.toggle('show',pill.dataset.val==='是');
  });
}

async function saveField(fieldId,value){
  if(!currentTester||!currentProduct) return;
  if(!currentProduct._data[currentTester]) currentProduct._data[currentTester]={};
  currentProduct._data[currentTester][fieldId]=value;
  // Save to server
  try{
    await fetch('/api/data/'+encodeURIComponent(currentProduct.name),{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tester:currentTester,fields:{[fieldId]:value}})
    });
  }catch(e){}
  // Check completion
  if(fieldId===currentProduct.completionField && value){
    setTimeout(()=>checkCompletion(),400);
  }
}

function checkCompletion(){
  const p=currentProduct;
  const label=p.completionLabel||p.name;
  const slot=document.getElementById('modalSlot');
  slot.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)this.parentNode.innerHTML=''">
    <div class="modal-box"><h3>✅ 填写完成</h3><div style="text-align:center;padding:16px;font-size:15px;line-height:2">你已完成<strong>${label}</strong>的填写<br>请确认后保存</div>
    <div style="display:flex;gap:8px;justify-content:center"><button class="btn pri" onclick="confirmCompletion()">✓ 确认保存</button><button class="btn" onclick="this.closest('.modal-overlay').remove()">继续修改</button></div></div></div>`;
}

function confirmCompletion(){
  CONFIRMED[currentProduct.name]=true;
  document.getElementById('modalSlot').innerHTML='';
  showToast('✅ '+(currentProduct.completionLabel||'')+' 已确认保存');
  // Check if all products done
  const allProducts=platform.products||[];
  const allDone=allProducts.every(p=>CONFIRMED[p.name]);
  if(allDone && allDone===true){
    setTimeout(()=>{
      document.getElementById('modalSlot').innerHTML=`<div class="modal-overlay"><div class="modal-box"><h3>🎉 全部完成</h3><div style="text-align:center;padding:16px;font-size:14px;line-height:2"><strong>${currentTester}</strong>，你已完成所有产品体验<br><br>${allProducts.map(p=>(p.icon||'')+' '+p.name+' ✅').join('<br>')}<br><br>已上传，感谢大家的配合 🙏</div><div style="text-align:center"><button class="btn pri" onclick="document.getElementById('modalSlot').innerHTML=''">好的</button></div></div></div>`;
    },500);
  }
}

// ==================== ACTIONS ====================
function switchTester(name){
  currentTester=name;
  render();
  window.scrollTo({top:200,behavior:'smooth'});
}
function goHome(){ currentView='home'; currentProduct=null; render(); }
function isLastProduct(){ const ps=platform.products||[]; const idx=ps.findIndex(p=>p.name===currentProduct?.name); return idx>=ps.length-1; }
function openNextProduct(){ const ps=platform.products||[]; const idx=ps.findIndex(p=>p.name===currentProduct?.name); if(idx<ps.length-1) openProduct(ps[idx+1].name); }
function submitFinal(){ if(currentProduct.completionField) saveField(currentProduct.completionField,'已确认'); checkCompletion(); }
function getCompletionFieldLabel(p){ const sec=(p.sections||[]).flatMap(s=>s.fields).find(f=>f.id===p.completionField); return sec?sec.label:p.completionField; }

async function exportCSV(){
  try{ window.open('/api/export/'+encodeURIComponent(currentProduct?.name||''),'_blank'); showToast('📥 CSV 下载中'); }
  catch(e){ showToast('导出失败'); }
}

async function resetMyData(){
  if(!confirm('清空 '+currentTester+' 在「'+currentProduct?.name+'」中的数据？')) return;
  try{
    await fetch('/api/delete/'+encodeURIComponent(currentProduct?.name),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tester:currentTester})});
  }catch(e){}
  if(currentProduct._data[currentTester]) delete currentProduct._data[currentTester];
  CONFIRMED[currentProduct.name]=false;
  render();
  showToast('🔄 已清空');
}

// ==================== UTILS ====================
function esc(s){ if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2000);
}

init();
